<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Antalya İhlal Haritası</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f5f5; }

#topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: white;
  border-bottom: 1px solid #e0e0e0; gap: 12px; flex-wrap: wrap;
}
#topbar h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; white-space: nowrap; }
#sheets-url-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; }
#sheets-url-wrap label { font-size: 12px; color: #666; white-space: nowrap; }
#sheets-url { font-size: 12px; padding: 5px 10px; border: 1px solid #ddd; border-radius: 6px; flex: 1; color: #1a1a1a; }
#yukle-btn {
  font-size: 12px; padding: 5px 14px; border-radius: 6px;
  background: #1565C0; color: white; border: none; cursor: pointer; white-space: nowrap;
}
#yukle-btn:hover { background: #0d47a1; }
#son-guncelleme { font-size: 11px; color: #888; white-space: nowrap; }

#app { display: flex; flex-direction: column; height: calc(100vh - 96px); }
#toolbar {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 8px 12px; background: white;
  border-bottom: 1px solid #e0e0e0; align-items: center;
}
#toolbar span { font-size: 12px; color: #666; margin-right: 4px; }
.filter-btn {
  font-size: 11px; padding: 4px 10px; border-radius: 20px;
  border: 1px solid; cursor: pointer; transition: all 0.15s;
  font-weight: 500; background: transparent;
}
.filter-btn.active { color: white !important; }

#main { display: flex; flex: 1; overflow: hidden; }
#map { flex: 1; }

#sidebar {
  width: 270px; overflow-y: auto;
  border-left: 1px solid #e0e0e0;
  background: white; display: flex; flex-direction: column;
}
#sidebar-header {
  padding: 10px 12px; border-bottom: 1px solid #e0e0e0;
  font-size: 13px; font-weight: 500; color: #1a1a1a;
  display: flex; align-items: center; justify-content: space-between;
}
#stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 10px 12px; border-bottom: 1px solid #e0e0e0; }
.stat-card { background: #f7f7f7; border-radius: 8px; padding: 8px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 500; color: #1a1a1a; }
.stat-lbl { font-size: 10px; color: #888; }

#list { flex: 1; overflow-y: auto; }
.ihlal-item { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.1s; }
.ihlal-item:hover { background: #f9f9f9; }
.ihlal-ilce { font-size: 11px; color: #888; }
.ihlal-baslik { font-size: 12px; font-weight: 500; color: #1a1a1a; margin: 2px 0; line-height: 1.4; }
.ihlal-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; color: white; margin-top: 2px; }
.ihlal-durum { font-size: 10px; margin-top: 4px; }
.ihlal-tarih { font-size: 10px; color: #aaa; margin-top: 2px; }

#yukleniyor {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: white; padding: 20px 30px; border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15); font-size: 14px; color: #444;
  z-index: 9999; display: none; text-align: center;
}

.leaflet-popup-content { font-family: system-ui, sans-serif !important; font-size: 13px !important; min-width: 200px; }
.popup-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #1a1a1a; }
.popup-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; color: white; margin-bottom: 8px; }
.popup-row { font-size: 12px; margin: 3px 0; color: #444; }
.popup-row strong { color: #222; }
.popup-link { font-size: 11px; margin-top: 8px; display: block; color: #1565C0; word-break: break-all; }
</style>
</head>
<body>

<div id="topbar">
  <h1>🗺 Antalya İhlal Haritası</h1>
  <div id="sheets-url-wrap">
    <label>Google Sheets CSV URL:</label>
    <input id="sheets-url" type="text" placeholder="https://docs.google.com/spreadsheets/d/SHEET_ID/export?format=csv&gid=0"/>
    <button id="yukle-btn" onclick="urldenYukle()">Yükle</button>
  </div>
  <span id="son-guncelleme">Henüz yüklenmedi</span>
</div>

<div id="app">
  <div id="toolbar">
    <span>Filtrele:</span>
    <button class="filter-btn active" data-cat="all" style="border-color:#555;color:#555;">Tümü</button>
    <button class="filter-btn" data-cat="maden" style="border-color:#8B4513;color:#8B4513;">Maden</button>
    <button class="filter-btn" data-cat="kiyi" style="border-color:#1565C0;color:#1565C0;">Kıyı</button>
    <button class="filter-btn" data-cat="su" style="border-color:#0097A7;color:#0097A7;">Su</button>
    <button class="filter-btn" data-cat="orman" style="border-color:#2E7D32;color:#2E7D32;">Orman</button>
    <button class="filter-btn" data-cat="kamulastirma" style="border-color:#6A1B9A;color:#6A1B9A;">Kamulaştırma</button>
    <button class="filter-btn" data-cat="tarim" style="border-color:#F57F17;color:#F57F17;">Tarım</button>
    <button class="filter-btn" data-cat="sit" style="border-color:#C62828;color:#C62828;">SİT/Koruma</button>
    <button class="filter-btn" data-cat="imar" style="border-color:#E65100;color:#E65100;">İmar</button>
  </div>
  <div id="main">
    <div id="map"></div>
    <div id="sidebar">
      <div id="sidebar-header">
        İhlal Listesi (<span id="count">0</span>)
      </div>
      <div id="stats">
        <div class="stat-card"><div class="stat-num" id="s-devam">0</div><div class="stat-lbl">Devam ediyor</div></div>
        <div class="stat-card"><div class="stat-num" id="s-mahkeme">0</div><div class="stat-lbl">Mahkemede</div></div>

        <div class="stat-card"><div class="stat-num" id="s-tamamlandi">0</div><div class="stat-lbl">Tamamlandı</div></div>
      </div>
      <div id="list"><div style="padding:20px;font-size:13px;color:#888;text-align:center;">Google Sheets URL'sini girin ve Yükle'ye tıklayın.</div></div>
    </div>
  </div>
</div>

<div id="yukleniyor">⏳ Veriler yükleniyor...</div>

  { id:23,ilce:"Manavgat",   lat:36.812, lng:31.521, cat:"imar",         baslik:"Manavgat Side kıyı imar artışı",             aciklama:"TAKS/KAKS artırımı içeren imar planı değişikliği.",                 durum:"devam",       kaynak:"Antalya BŞB, 2023",                 tarih:"2023-06-10" },

let tumVeri = [...VARSAYILAN_VERI];
let aktifCat = "all";
let markers = [];
let map;

// ---- CSV → JSON (güçlü parser) ----
function csvSatirIsleme(ham) {
  function csvParse(text) {
    const rows = [];
    const lines = text.trim().split("\n");
    for (const line of lines) {
      const row = [];
      let cur = "", inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (ch === ',' && !inQ) {
          row.push(cur.trim()); cur = "";
        } else cur += ch;
      }
      row.push(cur.trim());
      rows.push(row);
    }
    return rows;
  }

  const rows = csvParse(ham);
  if (rows.length < 2) return [];
  const basliklar = rows[0].map(s => s.replace(/"/g,"").toLowerCase().trim());

  return rows.slice(1).map(degerler => {
    const obj = {};
    basliklar.forEach((b,i) => obj[b] = (degerler[i] || "").replace(/"/g,"").trim());
    const lat = parseFloat(obj.lat);
    const lng = parseFloat(obj.lng);
    return {
      id:       parseInt(obj.id) || 0,
      ilce:     obj.ilce || "Bilinmiyor",
      lat:      isNaN(lat) ? 36.7 : lat,
      lng:      isNaN(lng) ? 30.7 : lng,
      cat:      obj.cat || "imar",
      baslik:   obj.baslik || "",
      aciklama: obj.aciklama || "",
      durum:    obj.durum || "devam",
      kaynak:   obj.kaynak || "",
      tarih:    obj.tarih_eklendi || obj.tarih || ""
    };
  }).filter(r => r.baslik && r.lat !== 36.7);
}

async function urldenYukle() {
  const url = document.getElementById("sheets-url").value.trim();
  if (!url) { alert("Lütfen Google Sheets CSV URL'sini girin."); return; }
  document.getElementById("yukleniyor").style.display = "block";
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const csv = await r.text();
    const yeniVeri = csvSatirIsleme(csv);
    if (yeniVeri.length === 0) throw new Error("Veri bulunamadı");
    tumVeri = yeniVeri;
    document.getElementById("son-guncelleme").textContent =
      "Son güncelleme: " + new Date().toLocaleString("tr-TR");
    guncelle();
  } catch(e) {
    alert("Yükleme hatası: " + e.message + "\n\nSheets'in CSV olarak paylaşıldığından emin olun.");
  } finally {
    document.getElementById("yukleniyor").style.display = "none";
  }
}

// ---- Harita ----
function createIcon(cat) {
  const color = (CATS[cat] || CATS.imar).color;
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
    iconSize: [14,14], iconAnchor: [7,7]
  });
}
function durumColor(d) {
  return { devam:"#E53935", mahkeme:"#6A1B9A", durduruldu:"#F57F17", tamamlandi:"#2E7D32" }[d] || "#888";
}

function renderList(data) {
  const list = document.getElementById('list');
  list.innerHTML = '';
  document.getElementById('count').textContent = data.length;
  const c = { devam:0, mahkeme:0, durduruldu:0, tamamlandi:0 };
  data.forEach(i => { if (c[i.durum] !== undefined) c[i.durum]++; });
  ["devam","mahkeme","durduruldu","tamamlandi"].forEach(k =>
    document.getElementById("s-"+k).textContent = c[k]);

  if (data.length === 0) {
    list.innerHTML = '<div style="padding:20px;font-size:13px;color:#888;text-align:center;">Bu kategoride kayıt yok.</div>';
    return;
  }
  data.sort((a,b) => (b.tarih||"").localeCompare(a.tarih||"")).forEach(item => {
    const div = document.createElement('div');
    div.className = 'ihlal-item';
    const cat = CATS[item.cat] || CATS.imar;
    div.innerHTML = `
      <div class="ihlal-ilce">${item.ilce}</div>
      <div class="ihlal-baslik">${item.baslik}</div>
      <span class="ihlal-badge" style="background:${cat.color}">${cat.label}</span>
      <div class="ihlal-durum" style="color:${durumColor(item.durum)}">● ${DURUMLAR[item.durum] || item.durum}</div>
      ${item.tarih ? `<div class="ihlal-tarih">${item.tarih}</div>` : ''}
    `;
    div.onclick = () => {
      map.setView([item.lat, item.lng], 13);
      markers.find(m => m._id === item.id)?.openPopup();
    };
    list.appendChild(div);
  });
}

function guncelle() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const data = aktifCat === "all" ? tumVeri : tumVeri.filter(i => i.cat === aktifCat);
  data.forEach(item => {
    const cat = CATS[item.cat] || CATS.imar;
    const m = L.marker([item.lat, item.lng], { icon: createIcon(item.cat) });
    m._id = item.id;
    const linkHtml = item.kaynak && item.kaynak.startsWith("http")
      ? `<a class="popup-link" href="${item.kaynak}" target="_blank">🔗 Kaynak</a>`
      : `<div class="popup-row"><strong>Kaynak:</strong> ${item.kaynak}</div>`;
    m.bindPopup(`
      <div class="popup-title">${item.baslik}</div>
      <span class="popup-badge" style="background:${cat.color}">${cat.label}</span>
      <div class="popup-row"><strong>İlçe:</strong> ${item.ilce}</div>
      <div class="popup-row" style="margin-top:6px;line-height:1.5">${item.aciklama}</div>
      <div class="popup-row" style="margin-top:6px;color:${durumColor(item.durum)}"><strong>Durum:</strong> ${DURUMLAR[item.durum] || item.durum}</div>
      ${linkHtml}
      ${item.tarih ? `<div class="popup-row"><strong>Tarih:</strong> ${item.tarih}</div>` : ''}
    `, { maxWidth: 280 });
    m.addTo(map);
    markers.push(m);
  });
  renderList(data);
}

// ---- Filtre butonları ----
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.remove('active');
      const c = b.dataset.cat;
      b.style.background = 'transparent';
      b.style.color = c === 'all' ? '#555' : (CATS[c]?.color || '#555');
    });
    btn.classList.add('active');
    aktifCat = btn.dataset.cat;
    btn.style.background = aktifCat === 'all' ? '#555' : (CATS[aktifCat]?.color || '#555');
    btn.style.color = 'white';
    guncelle();
  });
});

map = L.map('map').setView([36.7, 30.7], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap', maxZoom: 18
}).addTo(map);

// Google Sheets CSV URL — otomatik yükle
const SHEETS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSn2gU2JlMA_cdcsZrM2b22FFopJqB1Bme-Exgx9WDB1pfO5jHjtdpDUNo0RGwuZIWxN-uXdd-2Mhcq/pub?gid=330248702&single=true&output=csv";
document.getElementById("sheets-url").value = SHEETS_CSV_URL;

// Sayfa açılınca otomatik yükle
(async () => {
  document.getElementById("yukleniyor").style.display = "block";
  try {
    const r = await fetch(SHEETS_CSV_URL);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const csv = await r.text();
    const yeniVeri = csvSatirIsleme(csv);
    if (yeniVeri.length > 0) {
      tumVeri = yeniVeri;
      document.getElementById("son-guncelleme").textContent =
        "Son güncelleme: " + new Date().toLocaleString("tr-TR");
    } else {
      throw new Error("Veri boş");
    }
  } catch(e) {
    // Sheets'ten veri gelmezse varsayılan veri kullan
    document.getElementById("son-guncelleme").textContent = "Varsayılan veri yüklendi";
  } finally {
    document.getElementById("yukleniyor").style.display = "none";
    guncelle();
  }
})();
</script>
